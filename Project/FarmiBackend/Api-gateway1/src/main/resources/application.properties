spring.application.name=api-gateway
server.port=8080

# Register this gateway with Eureka and obtain the service registry.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Forward the Farmer service API through this gateway.
spring.cloud.gateway.routes[0].id=farmer-service
spring.cloud.gateway.routes[0].uri=lb://FARMER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/**
