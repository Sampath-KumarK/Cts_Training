spring.application.name=Customer-service
server.port=8084
spring.datasource.url=jdbc:mysql://localhost:3306/customers_db
spring.datasource.username=root
spring.datasource.password=Sampath@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# URL of the Eureka server
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# Register this client with the Eureka server (set to false for a server-only node)
eureka.client.registerWithEureka=true

# Fetch the registry from the Eureka server to locate other services
eureka.client.fetchRegistry=true
